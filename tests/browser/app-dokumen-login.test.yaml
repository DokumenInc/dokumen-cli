name: app-dokumen-login
reason: Verify PAT authentication on app.dokumen.app

# Browser configuration for video recording
browser:
  headless: false
  save_video: "1920x1080"

# Documentation files being tested (for coverage tracking)
files:
  - path: docs/authentication.md

executor:
  agent: browser-tester
  user_prompt: |
    Test the login flow on app.dokumen.app:

    1. Navigate to https://app.dokumen.app
    2. Take a screenshot of the initial login page using browser_take_screenshot
    3. Get the accessibility snapshot to find the PAT input field
    4. Read the test PAT from docs/authentication.md (this file contains the PAT)
    5. Use the full file contents (trimmed) as the PAT and type it into the input field
    6. Click the login/submit button
    7. Wait for the dashboard to load
    8. Wait 5 seconds for branch sync to finish
    9. Click the "Tests" link in the sidebar to force refresh
    10. Wait 3 seconds for the tests list to render
    11. Take a final screenshot showing the Tests view using browser_take_screenshot
    12. Get a final accessibility snapshot to verify tests are visible

    Report what you see at each step.
  tools:
    - browser_navigate
    - browser_click
    - browser_type
    - browser_take_screenshot
    - browser_snapshot
    - read_file
    - browser_wait

judges:
  - name: login-success
    system_prompt: |
      You are evaluating whether the browser automation successfully logged in to app.dokumen.app.

      Examine the executor output and verify:
      1. The executor navigated to app.dokumen.app
      2. A PAT was entered into the login form
      3. The login button was clicked
      4. The dashboard loaded successfully

      Signs of successful login:
      - Dashboard elements are visible in the final snapshot
      - Sidebar with navigation links (Tests, Files, Coverage, etc.)
      - No error messages displayed
      - User is authenticated (not on login page)

      You can use browser_snapshot to verify the current page state if needed.

      You MUST take at least one screenshot using browser_screenshot and base your verdict on what you see in that screenshot.

      Return your evaluation as JSON:
      {
        "verdict": "PASS" or "FAIL",
        "confidence": 0.0-1.0,
        "reason": "Brief explanation of your verdict"
      }
    tools:
      - browser_snapshot
      - browser_screenshot
    include_executor_output: true

timeout: 120
