name: demo-browser-output
reason: Demo browser test producing video and screenshots

files:
  - path: docs/login-flow.md

executor:
  agent: browser-tester
  user_prompt: |
    Follow the login flow documented in the file. Navigate to the login page,
    enter credentials, and verify the dashboard loads.
  tools:
    - read_file

browser:
  headless: true
  save_video: true
  viewport:
    width: 1280
    height: 720

judges:
  - name: flow-validation
    system_prompt: |
      Evaluate if the browser test successfully completed the login flow.
      Return JSON: {"verdict": "PASS", "confidence": 0.9, "reason": "..."}

timeout: 180
