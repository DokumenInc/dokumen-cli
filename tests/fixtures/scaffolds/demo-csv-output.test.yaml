name: demo-csv-output
reason: Demo test that writes CSV structured data as output

files:
  - path: docs/metrics.md

executor:
  agent: doc-validator
  user_prompt: |
    Read the metrics documentation and extract all mentioned metrics
    into a CSV file at output/metrics.csv with columns: name, type, description.
  tools:
    - read_file
    - write_file

judges:
  - name: completeness
    system_prompt: |
      Evaluate if the CSV contains all metrics from the documentation.
      Return JSON: {"verdict": "PASS", "confidence": 0.9, "reason": "..."}

timeout: 120
