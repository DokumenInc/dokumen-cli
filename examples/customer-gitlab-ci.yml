# Template for customer repositories using dokumen-cli
# Copy this to your repo as .gitlab-ci.yml

stages:
  - test

variables:
  DOKUMEN_IMAGE: registry.gitlab.com/justinlee_dokumen/dokumen-cli:latest

dokumen:
  stage: test
  image: $DOKUMEN_IMAGE
  script:
    - dokumen validate
    - dokumen run --output json --output junit
  artifacts:
    when: always
    paths:
      - .dokumen-cache/results.json
      - .dokumen-cache/coverage.json
      - .dokumen-cache/debug-traces/
      - .dokumen-cache/output/
      - .dokumen-cache/recordings/  # Legacy: kept for pre-migration pipelines
    reports:
      junit: .dokumen-cache/junit.xml
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "api"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH =~ /^user\//
      when: manual
