name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check dokumen dokumen_schema tests

      - name: Check formatting
        run: black --check dokumen dokumen_schema tests

      - name: Compile package
        run: python -m compileall -q dokumen dokumen_schema tests

      - name: Run tests
        run: pytest tests -q

      - name: Validate Dokumen scaffolds
        run: dokumen validate
